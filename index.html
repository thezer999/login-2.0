<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — ElectroTech</title>
    <style>
        /* Сброс базовых стилей */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f0c20;
            overflow-x: hidden;
            position: relative;
        }

        /* Цветные плавающие круги (blobs) для Glassmorphism */
        .background-blobs {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: float 10s infinite alternate ease-in-out;
        }

        .blob-1 {
            width: 350px;
            height: 350px;
            background: linear-gradient(135deg, #7928ca, #ff0080);
            top: 10%;
            left: 15%;
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #0070f3, #00dfd8);
            bottom: 10%;
            right: 15%;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, -40px) scale(1.1); }
        }

        /* Карточка формы (Glassmorphism) */
        .card-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4),
                        inset 0 1px 0 rgba(255, 255, 255, 0.2);
            color: #ffffff;
        }

        .card-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .card-header h2 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 30%, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card-header p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Поля ввода */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.85);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        .input-wrapper input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #6366f1;
            box-shadow: 0 0 12px rgba(99, 102, 241, 0.3);
        }

        /* Иконка переключения пароля */
        .toggle-password {
            position: absolute;
            right: 14px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.5);
            transition: color 0.2s ease;
        }

        .toggle-password:hover {
            color: #ffffff;
        }

        .toggle-password svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Кастомный Чекбокс */
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 24px;
        }

        .custom-checkbox {
            position: relative;
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.8);
            user-select: none;
        }

        .custom-checkbox input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .checkmark {
            height: 18px;
            width: 18px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            margin-right: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .custom-checkbox:hover input ~ .checkmark {
            border-color: #6366f1;
        }

        .custom-checkbox input:checked ~ .checkmark {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border-color: transparent;
        }

        .checkmark:after {
            content: "";
            display: none;
            width: 4px;
            height: 8px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
            margin-bottom: 2px;
        }

        .custom-checkbox input:checked ~ .checkmark:after {
            display: block;
        }

        .custom-checkbox a {
            color: #a5b4fc;
            text-decoration: none;
        }

        .custom-checkbox a:hover {
            text-decoration: underline;
        }

        /* Кнопка */
        .submit-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.35);
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(99, 102, 241, 0.5);
            background: linear-gradient(135deg, #4f46e5 0%, #9333ea 100%);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* Футер формы */
        .card-footer {
            text-align: center;
            margin-top: 22px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
        }

        .card-footer a {
            color: #a5b4fc;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .card-footer a:hover {
            color: #ffffff;
            text-decoration: underline;
        }

        /* Кастомное всплывающее уведомление (Toast) */
        .toast {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid rgba(16, 185, 129, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #ffffff;
            padding: 14px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 10;
            transition: top 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        .toast.show {
            top: 30px;
        }

        .toast-icon {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: #10b981;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>
<body>

    <!-- Фон с размытыми фигурами -->
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- Уведомление об успехе -->
    <div id="toast" class="toast">
        <svg class="toast-icon" viewBox="0 0 24 24">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
        <span>Вы успешно зарегистрировались!</span>
    </div>

    <!-- Карточка регистрации -->
    <div class="card-container">
        <div class="glass-card">
            <div class="card-header">
                <h2>ElectroTech</h2>
                <p>Создайте аккаунт для покупок</p>
            </div>

            <form id="registerForm" autocomplete="off">
                <div class="form-group">
                    <label for="fullName">Ваше имя</label>
                    <div class="input-wrapper">
                        <input type="text" id="fullName" placeholder="Александр Иванов" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" placeholder="alex@example.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="phone">Номер телефона</label>
                    <div class="input-wrapper">
                        <input type="tel" id="phone" placeholder="+998 90 123 45 67" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Пароль</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required minlength="6">
                        <button type="button" class="toggle-password" id="togglePasswordBtn" title="Показать/скрыть пароль" aria-label="Показать/скрыть пароль">
                            <!-- SVG Иконка закрытого глаза по умолчанию -->
                            <svg id="eyeIcon" viewBox="0 0 24 24">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                <line x1="1" y1="1" x2="23" y2="23"></line>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="checkbox-group">
                    <label class="custom-checkbox">
                        <input type="checkbox" id="terms" required>
                        <span class="checkmark"></span>
                        Согласен с <a href="#">правилами магазина</a>
                    </label>
                </div>

                <button type="submit" class="submit-btn">Зарегистрироваться</button>
            </form>

            <div class="card-footer">
                Уже есть аккаунт? <a href="#">Войти</a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const passwordInput = document.getElementById('password');
            const togglePasswordBtn = document.getElementById('togglePasswordBtn');
            const eyeIcon = document.getElementById('eyeIcon');
            const registerForm = document.getElementById('registerForm');
            const toast = document.getElementById('toast');

            // SVG структуры для глаза (открытый / закрытый)
            const eyeOpenPaths = `
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
            `;
            
            const eyeClosedPaths = `
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
            `;

            // Переключение видимости пароля
            togglePasswordBtn.addEventListener('click', () => {
                const isPassword = passwordInput.getAttribute('type') === 'password';
                
                if (isPassword) {
                    passwordInput.setAttribute('type', 'text');
                    eyeIcon.innerHTML = eyeOpenPaths;
                } else {
                    passwordInput.setAttribute('type', 'password');
                    eyeIcon.innerHTML = eyeClosedPaths;
                }
            });

            // Обработка отправки формы
            registerForm.addEventListener('submit', (e) => {
                e.preventDefault();

                // Показываем кастомный toast
                toast.classList.add('show');

                // Очищаем форму
                registerForm.reset();

                // Сбрасываем тип поля пароля обратно на "password"
                passwordInput.setAttribute('type', 'password');
                eyeIcon.innerHTML = eyeClosedPaths;

                // Скрываем toast через 3.5 секунды
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 3500);
            });
        });
    </script>
</body>
</html>
