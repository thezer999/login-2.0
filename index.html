<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация — ElectroTech Store</title>
  <!-- Подключение CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Фоновые цветные пятна -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <!-- Всплывающее уведомление -->
  <div id="toastNotification" class="notification">
    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
    <div>
      <strong style="display:block; font-size:14px;">Успешно!</strong>
      <span style="font-size:12px; color:#e2e8f0;">Вы успешно зарегистрированы в ElectroTech.</span>
    </div>
  </div>

  <!-- Карточка регистрации (Glassmorphism) -->
  <div class="glass-card">
    <div class="card-header">
      <span class="logo-tag">ElectroTech</span>
      <h1>Создать аккаунт</h1>
      <p>Бытовая техника и электроника</p>
    </div>

    <form id="registerForm" novalidate>
      
      <!-- Поле: Имя -->
      <div class="form-group">
        <label for="userName">Ваше имя</label>
        <div class="input-wrapper">
          <input type="text" id="userName" placeholder="Александр Иванов" required>
        </div>
      </div>

      <!-- Поле: Email -->
      <div class="form-group">
        <label for="userEmail">Электронная почта</label>
        <div class="input-wrapper">
          <input type="email" id="userEmail" placeholder="example@domain.com" required>
        </div>
      </div>

      <!-- Поле: Телефон -->
      <div class="form-group">
        <label for="userPhone">Номер телефона</label>
        <div class="input-wrapper">
          <input type="tel" id="userPhone" placeholder="+998 90 123 45 67" required>
        </div>
      </div>

      <!-- Поле: Пароль -->
      <div class="form-group">
        <label for="userPassword">Пароль</label>
        <div class="input-wrapper">
          <input type="password" id="userPassword" placeholder="••••••••" required>
          <button type="button" class="toggle-password" id="togglePasswordBtn" title="Показать/скрыть пароль">
            <!-- SVG Глаз -->
            <svg id="eyeIcon" viewBox="0 0 24 24">
              <path class="eye-open" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle class="eye-open" cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
      </div>

      <!-- Чекбокс правил -->
      <div class="checkbox-group">
        <label class="custom-checkbox">
          <input type="checkbox" id="agreeTerms" required>
          <span class="checkmark">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </span>
          Я согласен с <a href="#" class="terms-link">правилами магазина</a>
        </label>
      </div>

      <!-- Кнопка отправки -->
      <button type="submit" class="btn-submit">Зарегистрироваться</button>

    </form>

    <!-- Ссылка на вход -->
    <div class="card-footer">
      Уже есть аккаунт? <a href="#">Войти</a>
    </div>
  </div>

  <!-- Подключение JS -->
  <script src="script.js"></script>
</body>
</html>
